name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release


      - name: Debug test EXE presence
        run: |
          echo "Listing test output directories..."
          dir .\tests\BTChargeTrayWatcher.Tests\bin\Release\net10.0-windows10.0.19041.0
          dir .\tests\BTChargeTrayWatcher.Tests\bin\Release\net10.0-windows10.0.19041.0\win-x64


      - name: Run xUnit v3 tests (DLL root dir)
        run: |
          dotnet .\tests\BTChargeTrayWatcher.Tests\bin\Release\net10.0-windows10.0.19041.0\BTChargeTrayWatcher.Tests.dll --output Normal > test-output.log
        continue-on-error: true

      - name: Run xUnit v3 tests (DLL win-x64 dir)
        if: failure()
        run: |
          dotnet .\tests\BTChargeTrayWatcher.Tests\bin\Release\net10.0-windows10.0.19041.0\win-x64\BTChargeTrayWatcher.Tests.dll --output Normal > test-output.log
        continue-on-error: true

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
