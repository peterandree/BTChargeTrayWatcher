name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          # Use the evaluated ref name where available (works for push and release events).
          $v = '${{ github.ref_name }}'.TrimStart('v')
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish BTChargeTrayWatcher.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o ./publish

      - name: Create GitHub Release (on push tags)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/BTChargeTrayWatcher.exe
          generate_release_notes: true

      - name: Upload release assets (on release event)
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ./publish/BTChargeTrayWatcher.exe
          tag_name: ${{ github.event.release.tag_name }}
          generate_release_notes: false

      - name: Submit to winget
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: peterandree.BTChargeTrayWatcher
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
